<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalkulator Pajak Sederhana</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:350px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Kalkulator Pajak TULUS TAMPUBOLON</h2>

<label>Penghasilan (Rp)</label>
<input type="number" id="penghasilan" placeholder="Masukkan penghasilan">

<button onclick="hitungPajak()">Hitung Pajak</button>

<div class="result" id="hasil"></div>
</div>

<script>
function hitungPajak(){

let penghasilan = document.getElementById("penghasilan").value;

if(penghasilan == ""){
document.getElementById("hasil").innerHTML="Masukkan penghasilan";
return;
}

let pajak = 0;

// contoh perhitungan sederhana
if(penghasilan <= 50000000){
pajak = penghasilan * 0.05;
}
else if(penghasilan <= 250000000){
pajak = penghasilan * 0.15;
}
else{
pajak = penghasilan * 0.25;
}

document.getElementById("hasil").innerHTML =
"Pajak yang harus dibayar: Rp " + pajak.toLocaleString();
}
</script>

</body>
</html>
